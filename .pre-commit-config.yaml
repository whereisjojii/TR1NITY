# Pre-commit hooks for TR1NITY
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=10240"] # 10 MB hard limit
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown, css, html, javascript, jsx, ts, tsx]
        exclude: |
          (?x)^(
              docs/report/.*|
              docs/planning/.*\.md$|
              CHANGELOG\.md|
              .*\.lock$
          )$

  - repo: local
    hooks:
      - id: no-paid-apis
        name: "Reject mentions of paid APIs in source"
        entry: bash -c '! grep -REn "splunk\.com/billing|sentinel\.azure|paid_api_key" --include="*.py" --include="*.ts" --include="*.tsx" --include="*.yml" --include="*.yaml" services/ ui/ deploy/ 2>/dev/null'
        language: system
        pass_filenames: false
