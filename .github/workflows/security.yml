name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC scan to catch new CVEs in pinned deps
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # CodeQL static analysis on Python source
  # ----------------------------------------------------------------
  codeql:
    name: CodeQL (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  # ----------------------------------------------------------------
  # Trivy dependency + Dockerfile scan (filesystem mode)
  # ----------------------------------------------------------------
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy in fs mode
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ----------------------------------------------------------------
  # Trivy config scan (Dockerfiles, Compose, GH Actions)
  # ----------------------------------------------------------------
  trivy-config:
    name: Trivy (config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on configs
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: "."
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ----------------------------------------------------------------
  # Gitleaks secret scanning
  # ----------------------------------------------------------------
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
