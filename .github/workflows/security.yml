name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC scan to catch new CVEs in pinned deps
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # Force Git Bash explicitly — Windows runners with WSL2 (Docker Desktop) resolve
    # `shell: bash` to WSL's bash.EXE which cannot access D:\ paths or Windows Python.
    # Use the 8.3 short path (PROGRA~1) because GitHub Actions splits the `shell:`
    # field on the first space, which breaks `C:\Program Files\...`.
    shell: 'C:\PROGRA~1\Git\bin\bash.EXE --noprofile --norc -eo pipefail {0}'

jobs:
  # ----------------------------------------------------------------
  # pip-audit: known CVEs in Python pinned dependencies
  # ----------------------------------------------------------------
  pip-audit:
    name: pip-audit (${{ matrix.service }})
    runs-on: [self-hosted, tr1nity, windows]
    strategy:
      fail-fast: false
      matrix:
        service: [ingestor, correlator, ai-assist, api]
    steps:
      - uses: actions/checkout@v4

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Audit ${{ matrix.service }} runtime deps
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --strict
          else
            echo "No requirements.txt for ${{ matrix.service }} — skipping"
          fi

      - name: Audit ${{ matrix.service }} dev deps
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f requirements-dev.txt ]; then
            pip-audit -r requirements-dev.txt --strict
          else
            echo "No requirements-dev.txt for ${{ matrix.service }} — skipping"
          fi

  # ----------------------------------------------------------------
  # Trivy dependency + Dockerfile scan (filesystem mode)
  # ----------------------------------------------------------------
  trivy-fs:
    name: Trivy (filesystem)
    runs-on: [self-hosted, tr1nity, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy in fs mode
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ----------------------------------------------------------------
  # Trivy config scan (Dockerfiles, Compose, GH Actions)
  # ----------------------------------------------------------------
  trivy-config:
    name: Trivy (config)
    runs-on: [self-hosted, tr1nity, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on configs
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: config
          scan-ref: "."
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ----------------------------------------------------------------
  # Gitleaks secret scanning
  #
  # Note: gitleaks/gitleaks-action@v2 hardcodes the *.tar.gz asset URL,
  # but Windows releases of gitleaks ship as .zip — so the action 404s
  # on a self-hosted Windows runner. We install the binary directly
  # from the official release archive instead.
  # ----------------------------------------------------------------
  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: [self-hosted, tr1nity, windows]
    env:
      GITLEAKS_VERSION: 8.24.3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -e
          archive="gitleaks_${GITLEAKS_VERSION}_windows_x64.zip"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          mkdir -p .bin/gitleaks
          curl -sSL --fail "$url" -o ".bin/gitleaks/${archive}"
          (cd .bin/gitleaks && unzip -o "${archive}" >/dev/null)
          ./.bin/gitleaks/gitleaks.exe version

      - name: Run gitleaks
        run: |
          ./.bin/gitleaks/gitleaks.exe detect \
            --source . \
            --redact \
            --no-banner \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
