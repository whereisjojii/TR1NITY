name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # Force Git Bash explicitly — Windows runners with WSL2 (Docker Desktop) resolve
    # `shell: bash` to WSL's bash.EXE which cannot access D:\ paths or Windows Python.
    # Use the 8.3 short path (PROGRA~1) because GitHub Actions splits the `shell:`
    # field on the first space, which breaks `C:\Program Files\...`.
    shell: 'C:\PROGRA~1\Git\bin\bash.EXE --noprofile --norc -eo pipefail {0}'

jobs:
  build:
    name: Build MkDocs site
    runs-on: [self-hosted, tr1nity, windows]
    steps:
      - uses: actions/checkout@v4

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Build site
        run: mkdocs build --strict
