name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # Force Git Bash explicitly — Windows runners with WSL2 (Docker Desktop) resolve
    # `shell: bash` to WSL's bash.EXE which cannot access D:\ paths or Windows Python.
    # Use the 8.3 short path (PROGRA~1) because GitHub Actions splits the `shell:`
    # field on the first space, which breaks `C:\Program Files\...`.
    shell: 'C:\PROGRA~1\Git\bin\bash.EXE --noprofile --norc -eo pipefail {0}'

jobs:
  # ----------------------------------------------------------------
  # Repo-wide hygiene: pre-commit hooks + file size guard
  # ----------------------------------------------------------------
  hygiene:
    name: Repo hygiene
    runs-on: [self-hosted, tr1nity, windows]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Check no file > 10 MB committed
        run: |
          set -e
          large=$(find . -type f -size +10M ! -path "./.git/*" ! -path "./_work/*" || true)
          if [ -n "$large" ]; then
            echo "ERROR: files >10 MB are not allowed in this repo:"
            echo "$large"
            exit 1
          fi
          echo "All committed files are within the 10 MB limit."

  # ----------------------------------------------------------------
  # Python services: lint + unit tests + bandit (security)
  # ----------------------------------------------------------------
  python:
    name: Python (${{ matrix.service }})
    runs-on: [self-hosted, tr1nity, windows]
    needs: hygiene
    strategy:
      fail-fast: false
      matrix:
        service: [ingestor, correlator, ai-assist, api]
    steps:
      - uses: actions/checkout@v6

      - name: Install dev deps for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff pytest bandit

      - name: Lint with ruff
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Static security scan (bandit)
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d app ]; then
            bandit -r app -ll
          else
            echo "No app/ directory in ${{ matrix.service }} — skipping bandit"
          fi

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null; then
            pytest -q
          else
            echo "No tests yet for ${{ matrix.service }} (Phase 0 placeholder)"
          fi

  # ----------------------------------------------------------------
  # Docker Compose smoke test (Phase 0 onward)
  # ----------------------------------------------------------------
  compose:
    name: Docker Compose smoke
    runs-on: [self-hosted, tr1nity, windows]
    needs: hygiene
    steps:
      - uses: actions/checkout@v6

      - name: Validate docker-compose.yml
        run: |
          if [ -f deploy/docker-compose.yml ]; then
            docker compose -f deploy/docker-compose.yml config > /dev/null
            echo "docker-compose.yml is syntactically valid."
          else
            echo "deploy/docker-compose.yml not present yet (pre-Phase-0). Skipping."
          fi
