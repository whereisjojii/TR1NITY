name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ----------------------------------------------------------------
  # Repo-wide hygiene: pre-commit hooks + file size guard
  # ----------------------------------------------------------------
  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Check no file > 10 MB committed
        run: |
          set -e
          large=$(find . -type f -size +10M ! -path "./.git/*" || true)
          if [ -n "$large" ]; then
            echo "ERROR: files >10 MB are not allowed in this repo:"
            echo "$large"
            exit 1
          fi
          echo "All committed files are within the 10 MB limit."

  # ----------------------------------------------------------------
  # Python services: lint + type-check + unit tests
  # ----------------------------------------------------------------
  python:
    name: Python (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: hygiene
    strategy:
      fail-fast: false
      matrix:
        service: [ingestor, correlator, ai-assist, api]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps for ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff pytest

      - name: Lint with ruff
        working-directory: services/${{ matrix.service }}
        run: ruff check .

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -d tests ] || ls test_*.py 2>/dev/null; then
            pytest -q
          else
            echo "No tests yet for ${{ matrix.service }} (Phase 0 placeholder)"
          fi

  # ----------------------------------------------------------------
  # Docker Compose smoke test (Phase 0 onward)
  # ----------------------------------------------------------------
  compose:
    name: Docker Compose smoke
    runs-on: ubuntu-latest
    needs: hygiene
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: |
          if [ -f deploy/docker-compose.yml ]; then
            docker compose -f deploy/docker-compose.yml config > /dev/null
            echo "docker-compose.yml is syntactically valid."
          else
            echo "deploy/docker-compose.yml not present yet (pre-Phase-0). Skipping."
          fi
